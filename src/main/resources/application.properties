spring.application.name=payment-system

server.port=8080

spring.datasource.url=jdbc:mariadb://localhost:3306/mpesa_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Flyway database migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Hibernate now only validates schema (Flyway manages DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false

logging.level.com.mpesa=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=WARN

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app.fee.tier1=${FEE_TIER_1:100}
app.fee.tier2=${FEE_TIER_2:500}
app.fee.tier3=${FEE_TIER_3:1000}
app.fee.rate1=${FEE_RATE_1:0}
app.fee.rate2=${FEE_RATE_2:13}
app.fee.rate3=${FEE_RATE_3:25}
app.fee.rate4=${FEE_RATE_4:30}

app.rate-limit.max-requests=${RATE_LIMIT_MAX:60}

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false